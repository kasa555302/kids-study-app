<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>かだい</title></head>
<body>
<div layout:fragment="content">

  <div class="page-header rainbow-bg">
    <h2>📝 かだいチェックリスト</h2>
    <a th:href="@{/content-options}" class="btn btn-round btn-manage" style="margin-top:.5rem; font-size:.9rem;">
      ⚙ ないようの選択肢を編集
    </a>
  </div>

  <!-- かだい一覧 -->
  <div class="homework-list">
    <div th:each="hw : ${homeworks}"
         class="homework-card"
         th:classappend="${hw.done} ? 'done' : ''">
      <div class="hw-left">
        <form th:action="@{/homework/toggle/{id}(id=${hw.id})}" method="post">
          <button type="submit" class="check-btn"
                  th:text="${hw.done} ? '✅' : '⬜'"></button>
        </form>
        <div class="hw-info">
          <span class="hw-subject badge" th:text="${hw.subject}"></span>
          <span class="hw-content" th:text="${hw.content}"></span>
          <span class="hw-due" th:text="'日付: ' + ${hw.dueDate}"></span>
        </div>
      </div>
      <form th:action="@{/homework/delete/{id}(id=${hw.id})}" method="post">
        <button type="submit" class="btn-icon-del">🗑</button>
      </form>
    </div>
    <p th:if="${#lists.isEmpty(homeworks)}" class="empty-msg">かだいはないよ！🎉</p>
  </div>

  <!-- かだい追加フォーム -->
  <div class="card form-card">
    <h3>➕ かだいを追加する</h3>
    <form th:action="@{/homework/add}" th:object="${newHomework}" method="post" class="form-col">

      <!-- かもく -->
      <div class="form-row">
        <label class="label-big" for="subject">かもく：</label>
        <select th:field="*{subject}" id="subject" class="input-field select-field" required>
          <option value="">えらんでね</option>
          <option value="こくご">こくご</option>
          <option value="さんすう">さんすう</option>
          <option value="りか">りか</option>
          <option value="しゃかい">しゃかい</option>
          <option value="えいご">えいご</option>
          <option value="作文（にっき）">作文（にっき）</option>
          <option value="漢字">漢字</option>
        </select>
      </div>

      <!-- ないよう -->
      <div class="form-group">
        <span class="label-big">ないよう：</span>
        <div class="content-both-wrap">
          <select id="contentSelect" class="input-field select-field">
            <option value="">えらんでね（なくてもいいよ）</option>
            <option th:each="opt : ${contentOptions}"
                    th:value="${opt.label}"
                    th:text="${opt.label}"></option>
          </select>
          <input type="text" id="contentTypeInput" class="input-field"
                 placeholder="じぶんで追加入力（なくてもいいよ）">
        </div>
        <!-- 実際に送信される hidden フィールド -->
        <input type="hidden" th:field="*{content}" id="contentHidden">
      </div>

      <!-- 日付 -->
      <div class="form-row">
        <label class="label-big" for="dueDate">日付：</label>
        <input type="date" th:field="*{dueDate}" id="dueDate" class="input-field" required>
      </div>

      <button type="submit" class="btn btn-round btn-add" onclick="return prepareContent()">追加する！</button>
    </form>
  </div>

  <script th:inline="none">
  function prepareContent() {
    const sel  = document.getElementById('contentSelect').value.trim();
    const text = document.getElementById('contentTypeInput').value.trim();
    if (!sel && !text) {
      alert('ないようをえらぶか、じぶんで入力してね！');
      return false;
    }
    const combined = [sel, text].filter(v => v).join(' ');
    document.getElementById('contentHidden').value = combined;
    return true;
  }
  </script>

</div>
</body>
</html>
